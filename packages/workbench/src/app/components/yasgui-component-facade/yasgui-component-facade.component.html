<ontotext-yasgui
  class="{{cssClass()}}"
  [config]="config()"
  [language]="language()"
  [savedQueryConfig]="savedQueryConfig"
  (loadSavedQueries)="loadSavedQueries()"
  (createSavedQuery)="createSavedQuery($event)"
  (updateSavedQuery)="updateSavedQuery($event)"
  (deleteSavedQuery)="deleteSavedQuery($event)"
  (shareQuery)="shareQuery($event)"
  (shareSavedQuery)="shareSavedQuery($event)"
  (queryShareLinkCopied)="queryShareLinkCopied()"
  (saveQueryOpened)="saveQueryOpened($event)"
  (output)="output($event)">
</ontotext-yasgui>
