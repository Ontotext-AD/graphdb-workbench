<div class="login-form">
  <div class="card">
    <div class="card-body">
      <h1>{{ 'login.title' | transloco }}</h1>

      @if (isGDBLoginEnabled()) {
        <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
          @let hasWrongCredentials = loginForm.hasError('wrongCredentials');

          <div class="form-group" [ngClass]="{'has-error': hasWrongCredentials}">
            <span class="icon-wrapper">
              <i class="fa-solid fa-user"></i>
            </span>
            <input
              formControlName="username"
              autocomplete
              type="text"
              placeholder="{{ 'login.username_placeholder' | transloco }}"
              class="input-field"
              data-test="username-input"
            />
          </div>

          <div class="form-group" [ngClass]="{'has-error': hasWrongCredentials}">
            <span class="icon-wrapper">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input
              formControlName="password"
              autocomplete
              type="password"
              placeholder="{{ 'login.password_placeholder' | transloco }}"
              class="input-field"
              data-test="password-input"
            />
          </div>

          <div class="action">
            <button type="submit" class="btn btn-primary btn-lg" data-test="submit-btn">
              {{ 'login.sign_in' | transloco }}
            </button>
          </div>
        </form>
      } @else if (isOpenIDEnabled()) {
        <button (click)="loginWithOpenID()" class="btn btn-primary btn-lg">
          {{ 'login.sign_in_openid' | transloco }}
        </button>
      }
    </div>
  </div>
</div>
