@if (currentRepository() && language()) {
  <graphwise-reactodia
    [queryFunction]="queryFunction"
    [currentRepository]="currentRepository()"
    [language]="language()">
  </graphwise-reactodia>
} @else {
  <div>
    <p>No repository selected. Please select a repository to view the Reactodia graph.</p>
  </div>
}
