<div class="simple-method" guide-selector="iri-discovery-search">
    <input type="checkbox" id="{{'iri_discovery_search_checkbox'}}" guide-selector="iri-discovery-search-input"
           name="{{iri_discovery_search}}" class="switch"
           ng-model="extractionMethod.selected"/>
    <label for="{{'iri_discovery_search_checkbox'}}"></label>
    <a class="btn btn-link extraction-method-label"
       uib-popover="{{'ttyg.agent.create_agent_modal.form.additional_query_methods.method.iri_discovery_search.tooltip' | translate}}"
       popover-trigger="mouseenter">
        {{'ttyg.agent.create_agent_modal.form.additional_query_methods.method.iri_discovery_search.label' | translate}}
    </a>
</div>
